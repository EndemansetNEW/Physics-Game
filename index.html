<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Sorting Algorithm Visualizer</title>
    <style>
        body {
            background: white;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
        }
        #canvas {
            border: 1px solid #ccc;
            display: block;
            margin: 20px auto;
        }
        #info {
            font-size: 18px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<h1 id="title">Bubble Sort - Ascending</h1>
<canvas id="canvas" width="800" height="600"></canvas>

<div id="info">
    R = Reset | SPACE = Start Sorting | A = Ascending | D = Descending<br>
    I = Insertion Sort | B = Bubble Sort
</div>

<script src="sort.js"></script>
</body>
</html>
